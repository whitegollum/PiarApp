  openclaw-gateway-piara:
    container_name: openclawPiara
    environment:
      HOME: /data
      PNPM_STORE_DIR: /data/.pnpm-store
      TZ: Europe/Madrid
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      BRAVE_API_KEY: "${BRAVE_API_KEY:-}"
      OPENCLAW_GATEWAY_PASSWORD: "${OPENCLAW_GATEWAY_PASSWORD}"
    image: openclaw:latest
    ports:
      - '18789:18789'
    restart: unless-stopped
    stdin_open: True
    tty: True
    volumes:
      - /mnt/apps/clawdbot/data:/app/data

networks:
  piar-network:
    driver: bridge

volumes:
  piar_data:
